<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真成長記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#080808;color:#e8e8e8;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222}
input,textarea{font-family:'DM Mono',monospace;background:transparent;border:none;border-bottom:1px solid #222;color:#e8e8e8;outline:none;width:100%;padding:8px 0;font-size:12px;line-height:1.7;resize:none}
input:focus,textarea:focus{border-bottom-color:#444}
input::placeholder,textarea::placeholder{color:#333}
button{cursor:pointer}
.nav{border-bottom:1px solid #141414;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;background:#080808;z-index:10;height:48px}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}
.nav-tabs{display:flex}
.tab-btn{background:none;border:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:0 20px;height:48px;color:#333;border-bottom:2px solid transparent}
.tab-btn:hover{color:#777}
.tab-btn.active{color:#e8e8e8;border-bottom-color:#e8e8e8}
.streak{font-size:10px;color:#333;letter-spacing:.1em}
.main{max-width:640px;margin:0 auto;padding:40px 32px 80px}
.day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px}
.day-date{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.01em;line-height:1}
.day-weekday{font-size:10px;color:#444;letter-spacing:.18em;margin-top:8px}
.save-btn{background:#e8e8e8;border:none;color:#080808;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;font-weight:500;padding:8px 20px}
.save-btn:hover{background:#fff}
.saved-msg{font-size:10px;color:#444;letter-spacing:.1em}
.section{margin-bottom:40px}
.section-div{border-top:1px solid #141414;margin:0 0 40px}
.lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.row-gap{display:flex;align-items:center;gap:12px}
.ghost-btn{background:none;border:1px solid #1e1e1e;color:#555;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px}
.ghost-btn:hover{border-color:#444;color:#e8e8e8}
.ghost-btn:disabled{opacity:.25;cursor:default}
.notice{background:#0c0c0c;border:1px solid #1a1a1a;padding:14px 16px;margin-bottom:16px}
.notice p{font-size:11px;color:#555;line-height:1.9}
.notice strong{color:#888}
.url-input-wrap{margin-top:12px}
.url-input-wrap input{background:#0a0a0a;border:1px solid #1e1e1e!important;border-bottom:1px solid #1e1e1e!important;padding:8px 12px;font-size:11px}
.url-input-wrap input:focus{border-color:#444!important;border-bottom-color:#444!important}
.url-btns{display:flex;gap:8px;margin-top:12px}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #111}
.task-row:last-child{border-bottom:none}
.cb{width:13px;height:13px;border:1px solid #2a2a2a;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cb.done{background:#e8e8e8;border-color:#e8e8e8}
.cb.done::after{content:'✓';color:#080808;font-size:9px;font-weight:700;line-height:1}
.task-title{font-size:13px;letter-spacing:.02em;line-height:1.6}
.task-title.done{color:#2a2a2a;text-decoration:line-through}
.task-title.overdue{color:#cc6666}
.task-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{display:inline-block;border:1px solid #1e1e1e;color:#444;font-size:10px;letter-spacing:.04em;padding:3px 8px}
.task-due{font-size:11px;color:#444;letter-spacing:.05em}
.task-due.overdue{color:#cc6666}
.drop-zone{border:1px dashed #1e1e1e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;position:relative}
.drop-zone:hover{border-color:#333}
.drop-zone .plus{font-size:18px;color:#1e1e1e}
.drop-zone .hint{font-size:10px;color:#444;letter-spacing:.12em}
.drop-zone .sub{font-size:9px;color:#2a2a2a;letter-spacing:.08em}
.photo-wrap{position:relative;width:100%}
.photo-wrap img{width:100%;max-height:500px;object-fit:contain;display:block;background:#050505}
.del-btn{position:absolute;top:10px;right:10px;background:rgba(8,8,8,.88);border:1px solid #2a2a2a;color:#888;font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;letter-spacing:.06em}
.del-btn:hover{color:#e8e8e8;border-color:#555}
.lens-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.lens-btn{background:none;border:1px solid #1a1a1a;color:#444;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:4px 10px}
.lens-btn:hover{border-color:#333;color:#aaa}
.lens-btn.active{border-color:#444;color:#e8e8e8}
.pro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.pro-slot{}
.pro-drop{border:1px dashed #1a1a1a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;height:80px;cursor:pointer;margin-bottom:8px;position:relative}
.pro-drop:hover{border-color:#2a2a2a}
.pro-drop img{width:100%;height:80px;object-fit:cover;display:block}
.pro-del{position:absolute;top:4px;right:4px;background:rgba(8,8,8,.9);border:1px solid #2a2a2a;color:#888;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px}
.week-tabs{display:flex;border-bottom:1px solid #141414;margin-bottom:28px}
.week-tab{background:none;border:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:#333;padding:8px 0;border-bottom:2px solid transparent;margin-right:20px}
.week-tab:hover{color:#777}
.week-tab.active{color:#e8e8e8;border-bottom-color:#e8e8e8}
.week-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;display:flex;align-items:baseline;gap:14px;margin-bottom:24px}
.week-dates{font-size:10px;color:#444;letter-spacing:.08em;font-family:'DM Mono',monospace}
.constraint{border-left:2px solid #441a1a;padding-left:16px;margin-bottom:28px}
.constraint .lbl{color:#441a1a;margin-bottom:6px}
.constraint p{font-size:12px;color:#884444;line-height:1.7;letter-spacing:.02em}
.mission-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.mission-box{border-top:1px solid #141414;padding-top:14px}
.mission-box .lbl{margin-bottom:10px}
.mission-box p{font-size:11px;color:#666;line-height:1.9;letter-spacing:.02em}
.check-section{border-top:1px solid #141414;padding-top:16px;margin-bottom:32px}
.check-section .lbl{margin-bottom:12px}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;cursor:pointer}
.check-text{font-size:12px;color:#999;line-height:1.6;letter-spacing:.02em}
.check-text.done{color:#333;text-decoration:line-through}
.progress-section{border-top:1px solid #141414;padding-top:20px}
.progress-section .lbl{margin-bottom:12px}
.progress-bar{display:flex;gap:3px;margin-bottom:8px}
.progress-seg{flex:1;height:2px;background:#141414}
.progress-seg.done{background:#e8e8e8}
.progress-label{font-size:10px;color:#444;letter-spacing:.08em}
.log-header{margin-bottom:36px}
.log-header h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em}
.log-header p{font-size:10px;color:#444;letter-spacing:.15em;margin-top:6px}
.log-empty{font-size:11px;color:#333;line-height:3;letter-spacing:.08em}
.log-entry{display:grid;grid-template-columns:80px 1fr;gap:16px;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid #0c0c0c}
.log-thumb{background:#0e0e0e;height:80px;overflow:hidden}
.log-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.log-thumb-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#1a1a1a;letter-spacing:.1em}
.log-date{font-size:12px;color:#e8e8e8;letter-spacing:.04em}
.log-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.log-comment{font-size:11px;color:#555;line-height:1.7;letter-spacing:.01em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.log-pro{display:flex;gap:5px;align-items:center;margin-top:6px}
.log-pro-label{font-size:9px;color:#333;letter-spacing:.08em}
.hidden{display:none}
.detail-back{background:none;border:none;font-family:'DM Mono',monospace;font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase;padding:0;margin-bottom:28px;display:flex;align-items:center;gap:8px;cursor:pointer}
.detail-back:hover{color:#e8e8e8}
.detail-date{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.detail-lens{display:inline-block;border:1px solid #1e1e1e;color:#555;font-size:10px;letter-spacing:.04em;padding:3px 8px;margin-bottom:24px}
.detail-photo{width:100%;margin-bottom:24px}
.detail-photo img{width:100%;max-height:600px;object-fit:contain;display:block;background:#050505}
.detail-no-photo{height:160px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1a1a1a;letter-spacing:.1em;margin-bottom:24px}
.detail-section{border-top:1px solid #141414;padding-top:16px;margin-bottom:28px}
.detail-comment{font-size:13px;color:#aaa;line-height:1.9;letter-spacing:.02em;margin-top:10px}
.detail-pro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:14px}
.detail-pro-img{width:100%;height:120px;object-fit:cover;display:block;background:#0e0e0e;margin-bottom:8px}
.detail-pro-empty{width:100%;height:120px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:9px;color:#1a1a1a;letter-spacing:.1em;margin-bottom:8px}
.detail-pro-memo{font-size:11px;color:#666;line-height:1.7;letter-spacing:.02em}
.edit-btn{background:none;border:1px solid #1e1e1e;color:#555;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:5px 14px;cursor:pointer;margin-top:16px}
.edit-btn:hover{border-color:#444;color:#e8e8e8}
.edit-mode-wrap{margin-top:16px;padding-top:16px;border-top:1px solid #141414}
.edit-mode-wrap .lbl{margin-bottom:8px}
.edit-drop{border:1px dashed #1e1e1e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer;margin-bottom:14px}
.edit-drop:hover{border-color:#333}
.log-entry{cursor:pointer}
.log-entry:hover .log-date{color:#fff}
/* 学習タブ */
.learn-header{margin-bottom:32px}
.learn-week-badge{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444;margin-bottom:8px}
.learn-week-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
.learn-week-sub{font-size:11px;color:#555;letter-spacing:.04em}
.learn-section{margin-bottom:36px}
.learn-section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid #141414;cursor:pointer}
.learn-section-title{font-size:13px;font-weight:500;letter-spacing:.02em}
.learn-section-badge{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border:1px solid #1e1e1e;color:#444}
.learn-section-badge.shooting{border-color:#334;color:#667}
.learn-section-badge.editing{border-color:#443;color:#776}
.learn-body{padding:16px 0 20px}
.learn-goal{font-size:11px;color:#888;letter-spacing:.04em;margin-bottom:16px;padding:10px 14px;background:#0c0c0c;border-left:2px solid #222}
.learn-theory{font-size:12px;color:#777;line-height:2;letter-spacing:.02em;margin-bottom:20px;white-space:pre-wrap}
.learn-yt{margin-bottom:20px}
.learn-yt-link{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0c0c0c;border:1px solid #1a1a1a;text-decoration:none;color:#e8e8e8}
.learn-yt-link:hover{border-color:#333}
.learn-yt-icon{font-size:14px;flex-shrink:0}
.learn-yt-text{font-size:11px;color:#777;letter-spacing:.03em}
.learn-practice{margin-bottom:20px}
.learn-practice-text{font-size:12px;color:#aaa;line-height:1.9;letter-spacing:.02em;margin-top:8px;padding:12px 14px;background:#0c0c0c;border-left:2px solid #e8e8e820}
.learn-checklist{margin-bottom:20px}
.learn-check-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #0e0e0e;cursor:pointer}
.learn-check-item:last-child{border-bottom:none}
.learn-check-text{font-size:12px;color:#777;line-height:1.6;letter-spacing:.02em}
.learn-check-text.done{color:#333;text-decoration:line-through}
.learn-memo{margin-top:16px}
.learn-memo textarea{border:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:10px 12px;font-size:11px;background:#0a0a0a;line-height:1.8}
.learn-save-btn{margin-top:10px;background:#e8e8e8;border:none;color:#080808;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;font-weight:500;padding:7px 18px;cursor:pointer}
.learn-save-btn:hover{background:#fff}
.week-card{border:1px solid #141414;padding:20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.week-card:hover{border-color:#2a2a2a}
.week-card.active{border-color:#444}
.week-card.complete{border-left:2px solid #e8e8e8}
.week-card.active.complete{border-color:#e8e8e8}
.week-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.week-card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.week-card-status{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#333}
.week-card-status.done{color:#e8e8e8}
.week-card-sub{font-size:10px;color:#333;letter-spacing:.06em;margin-bottom:12px}
.week-progress-wrap{margin-bottom:6px}
.week-progress-track{height:2px;background:#141414;width:100%}
.week-progress-fill{height:2px;background:#e8e8e8;transition:width .3s}
.week-progress-label{font-size:9px;color:#333;letter-spacing:.1em;margin-top:5px}
.week-detail{margin-top:16px;padding-top:16px;border-top:1px solid #141414}
.week-detail .constraint{margin-bottom:16px}
.week-detail .mission-grid{margin-bottom:0}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">写真成長記録</span>
  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="today">今日</button>
    <button class="tab-btn" data-tab="learn">学習</button>
    <button class="tab-btn" data-tab="plan">プラン</button>
    <button class="tab-btn" data-tab="log">ログ</button>
  </div>
  <span class="streak" id="streak"></span>
</nav>

<div class="main">

  <!-- TODAY -->
  <div id="tab-today">
    <div class="day-header">
      <div>
        <div class="day-date" id="day-date"></div>
        <div class="day-weekday" id="day-weekday"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding-top:4px">
        <span class="saved-msg hidden" id="saved-msg">保存済み</span>
        <button class="save-btn" id="save-btn">SAVE</button>
      </div>
    </div>

    <!-- 課題 -->
    <div class="section">
      <div class="row-between">
        <div class="row-gap">
          <span class="lbl">課題</span>
          <span id="task-count" style="font-size:10px;color:#666"></span>
        </div>
        <div class="row-gap">
          <button class="ghost-btn" id="url-toggle-btn">URL設定</button>
          <button class="ghost-btn" id="sync-btn">SYNC</button>
        </div>
      </div>
      <div class="notice hidden" id="url-panel">
        <p>Apps Scriptをデプロイして発行されたURLを貼る<br>※デプロイ設定の「アクセスできるユーザー」を<strong>「全員」</strong>に設定</p>
        <div class="url-input-wrap">
          <input type="text" id="url-input" placeholder="https://script.google.com/macros/s/...">
        </div>
        <div class="url-btns">
          <button class="save-btn" id="url-save-btn">保存してSYNC</button>
          <button class="ghost-btn" id="url-cancel-btn">キャンセル</button>
        </div>
      </div>
      <div class="notice hidden" id="task-error"><p id="task-error-msg"></p></div>
      <div id="task-empty" style="font-size:11px;color:#333;padding:16px 0;letter-spacing:.05em">「URL設定」からApps ScriptのURLを登録してください</div>
      <div id="task-list"></div>
    </div>

    <div class="section-div"></div>

    <!-- 写真記録 -->
    <div class="section">
      <div class="lbl" style="margin-bottom:4px">写真記録</div>
      
      <div class="drop-zone" id="photo-drop" style="height:160px;margin-bottom:14px">
        <span class="plus">+</span>
        <span class="hint">写真をドロップ or クリック</span>
        <span class="sub">原画質で保存</span>
      </div>
      <input type="file" accept="image/*" id="photo-input" class="hidden">
      <div class="lens-wrap" id="lens-wrap"></div>
      <textarea id="photo-comment" rows="3" placeholder="今日の気づき — 「光が良かった」は不正解。「逆光で葉が透けて希望を感じるから」が正解。"></textarea>
    </div>

    <div class="section-div"></div>

    <!-- プロ研究 -->
    <div class="section">
      <div class="lbl" style="margin-bottom:4px">プロ研究</div>
      <div style="font-size:10px;color:#444;letter-spacing:.06em;margin-bottom:18px;line-height:1.8">プロ写真家の作品を3枚アップして「なぜ良いか」を1行で</div>
      <div class="pro-grid" id="pro-grid"></div>
    </div>
  </div>

  <!-- PLAN -->
  <div id="tab-plan" class="hidden">
    <div class="log-header">
      <h1>週間プラン</h1>
      <p>6 WEEK INTENSIVE</p>
    </div>
    <div class="week-tabs" id="week-tabs"></div>
    <div id="week-content"></div>
  </div>

  <!-- LEARN -->
  <div id="tab-learn" class="hidden">
    <div id="learn-content"></div>
  </div>

  <!-- LOG -->
  <div id="tab-log" class="hidden">
    <div id="log-list-view">
      <div class="log-header">
        <h1>ログ一覧</h1>
        <p id="log-count">0 ENTRIES</p>
      </div>
      <div id="log-list"></div>
    </div>
    <div id="log-detail-view" class="hidden">
      <button class="detail-back" id="detail-back-btn">← 一覧に戻る</button>
      <div id="detail-content"></div>
    </div>
  </div>

</div>

<script>

const CURRICULUM = [
  {
    week: 1,
    shooting: {
      theme: "光を読む",
      goal: "朝・夕の光の違いを体で覚える",
      theory: `光には「質」と「方向」がある。同じ場所でも朝6時と昼12時では全く別の写真になる。\n\n・マジックアワー（日の出後30分・日没前30分）→ 光が柔らかくオレンジ
・昼間の光 → 硬くて影が強い、色が平坦\n
α6400の設定：f2.8、SS1/500〜1/1000、ISO Auto(上限3200)、RAW必須`,
      youtube: [{title:"光の方向と質を理解する（逆光・順光・斜光）", url:"https://www.youtube.com/results?search_query=%E5%85%89%E3%81%AE%E6%96%B9%E5%90%91+%E5%86%99%E7%9C%9F+%E9%80%86%E5%85%89+%E9%A0%86%E5%85%89+%E8%A7%A3%E8%AA%AC"}],
      practice: "同じ場所を朝・昼・夕の3回撮り比べる。設定を変えずに時間帯だけ変える。3枚をログに貼って「一番好きな光はどれか・なぜか」を書く。",
      checklist: ["朝（6〜8時）に撮影した","夕方（16〜18時）に撮影した","同じ場所・同じ被写体で撮り比べた","ログに気づきを書いた"]
    },
    editing: {
      theme: "Lightroomの基礎パネルを完全理解",
      goal: "露光量・コントラスト・ハイライト・シャドウの役割を体で覚える",
      theory: `Lightroomの基本4スライダーの意味：\n\n・露光量 → 写真全体の明るさ。+1で約2倍明るく

// ── IndexedDB ─────────────────────────────────
const IDB = (() => {
  let db = null;
  function open() {
    if (db) return Promise.resolve(db);
    return new Promise((res, rej) => {
      const req = indexedDB.open('photo_tracker_v1', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('photos');
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror = () => rej(req.error);
    });
  }
  return {
    async set(key, blob) {
      const d = await open();
      return new Promise((res, rej) => {
        const tx = d.transaction('photos', 'readwrite');
        tx.objectStore('photos').put(blob, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    },
    async get(key) {
      const d = await open();
      return new Promise((res, rej) => {
        const req = d.transaction('photos').objectStore('photos').get(key);
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => rej(req.error);
      });
    },
    async del(key) {
      const d = await open();
      return new Promise(res => {
        const tx = d.transaction('photos', 'readwrite');
        tx.objectStore('photos').delete(key);
        tx.oncomplete = () => res(true);
      });
    }
  };
})();

// ── ユーティリティ ─────────────────────────────
function fmtFull(s) {
  try { const d = new Date(s + 'T00:00:00'); return `${d.getMonth()+1}月${d.getDate()}日`; } catch { return s; }
}
function isOverdue(due) { return due && new Date(due + 'T23:59:59') < new Date(); }
function qs(sel) { return document.querySelector(sel); }
function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html) e.innerHTML = html; return e; }

// ── タブ切り替え ──────────────────────────────
function switchTab(tab) {

  document.querySelectorAll('#tab-today,#tab-learn,#tab-plan,#tab-log').forEach(d => d.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');

  if (tab === 'learn') renderLearn();
}
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

async function handlePhotoFile(file) {

  const blob = new Blob([await file.arrayBuffer()], {type: file.type || 'image/jpeg'});
  await IDB.set('main_' + state.today, blob);
  if (state.photoObjUrl) URL.revokeObjectURL(state.photoObjUrl);
  state.photoObjUrl = URL.createObjectURL(blob);
  renderPhotoZone();
}

function renderPhotoZone() {
  const drop = qs('#photo-drop');
  if (state.photoObjUrl) {
    drop.innerHTML = '';
    drop.style.height = 'auto';
    const wrap = el('div', 'photo-wrap');
    const img = el('img'); img.src = state.photoObjUrl;

    btn.addEventListener('click', async e => {

// ── 課題 ──────────────────────────────────────
function renderTasks() {
  const tasks = state.tasks;
  qs('#task-empty').style.display = (tasks.length === 0 && !state.scriptUrl) ? 'block' : 'none';
  const list = qs('#task-list');
  list.innerHTML = '';
  const pending = tasks.filter(t => !state.tasksDone[t.id||t.title+t.due]);
  qs('#task-count').textContent = pending.length > 0 ? pending.length + '件' : '';
  tasks.forEach(t => {
    const k = t.id || t.title + t.due;
    const done = !!state.tasksDone[k];
    const over = isOverdue(t.due) && !done;
    const row = el('div', 'task-row');
    const cb = el('div', 'cb' + (done ? ' done' : ''));
    cb.addEventListener('click', () => {
      state.tasksDone[k] = !state.tasksDone[k];
      LS.set('tasks_done', state.tasksDone);
      renderTasks();
    });
    const info = el('div');
    info.style.flex = '1';
    const title = el('div', 'task-title' + (done ? ' done' : over ? ' overdue' : ''));
    title.textContent = t.title;
    const meta = el('div', 'task-meta');
    if (t.subject) { const tag = el('span', 'tag'); tag.textContent = t.subject; meta.appendChild(tag); }
    if (t.due) { const due = el('span', 'task-due' + (over ? ' overdue' : '')); due.textContent = fmtFull(t.due) + (over ? ' · 期限切れ' : ''); meta.appendChild(due); }
    info.appendChild(title); info.appendChild(meta);
    row.appendChild(cb); row.appendChild(info);
    list.appendChild(row);
  });
}

async function syncTasks(url) {
  const target = url || state.scriptUrl;
  if (!target) return;
  qs('#sync-btn').textContent = '...';
  qs('#sync-btn').disabled = true;
  qs('#task-error').classList.add('hidden');
  try {
    const res = await fetch(target, {redirect:'follow'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { throw new Error('JSONではない応答です。URLを直接ブラウザで開いて確認してください'); }
    if (data.error) throw new Error(data.error);
    const list = Array.isArray(data) ? data : (data.tasks || []);
    state.tasks = list;
    LS.set('tasks_cache', {tasks: list, fetchedAt: new Date().toISOString()});
    renderTasks();
  } catch(e) {
    qs('#task-error-msg').textContent = e.message === 'Failed to fetch'
      ? '接続失敗。デプロイ設定で「アクセスできるユーザー：全員」になっているか確認してください'
      : e.message;
    qs('#task-error').classList.remove('hidden');
  }
  qs('#sync-btn').textContent = 'SYNC';
  qs('#sync-btn').disabled = false;
}

qs('#url-toggle-btn').addEventListener('click', () => {
  const panel = qs('#url-panel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) qs('#url-input').value = state.scriptUrl;
});
qs('#url-cancel-btn').addEventListener('click', () => qs('#url-panel').classList.add('hidden'));
qs('#url-save-btn').addEventListener('click', () => {
  const url = qs('#url-input').value.trim();
  state.scriptUrl = url;
  LS.set('script_url', url);
  qs('#url-panel').classList.add('hidden');
  syncTasks(url);
});

// 各Weekのログ記録回数を計算する関数
// 解説: localStorageのmetaを全部見てcommentがあるものをカウント
// C言語で言うと配列を走査してnull以外の要素数を数えるイメージ
function getWeekLogCount(weekId) {
  const meta = LS.get('meta') || {};
  const w = WEEKS.find(x => x.id === weekId);
  if (!w) return 0;
  // Weekの開始・終了日をパース（例: "5/28〜6/3"）
  // シンプルに全ログのうちcommentがある日数を返す（日付範囲は目安として表示のみ）
  // 実際のカウントは累計ログ数をWeekごとに5件ずつ割り当てる
  const allDates = Object.keys(meta).filter(d => meta[d]?.comment).sort();
  const start = (weekId - 1) * 5;
  const end = weekId * 5;
  return Math.min(allDates.length - start, 5) < 0 ? 0 : Math.min(allDates.length - start, 5);
}

// Week完了判定: 5回ログを記録したらcomplete
function isWeekComplete(weekId) {
  return getWeekLogCount(weekId) >= 5;
}

function renderPlan() {
  const container = qs('#week-content');
  container.innerHTML = '';

  // 全体サマリー
  const completedCount = WEEKS.filter(w => isWeekComplete(w.id)).length;

  const summary = el('div');
  summary.style.cssText = 'margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #141414';
  summary.innerHTML = `

    </div>
    <div style="display:flex;gap:3px;margin-bottom:6px">
      ${WEEKS.map(w => {
        const count = getWeekLogCount(w.id);
        const pct = Math.min(count / 5 * 100, 100);
        return `<div style="flex:1;height:3px;background:#141414;position:relative;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${isWeekComplete(w.id)?'#e8e8e8':'#444'}"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:9px;color:#333;letter-spacing:.12em">${completedCount} / 6 WEEKS COMPLETE</div>

  container.appendChild(summary);

  // 各Weekカード
  WEEKS.forEach(w => {

    const isActive = state.activeWeek === w.id;

    const card = el('div', `week-card${complete?' complete':''}${isActive?' active':''}`);

        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:9px;color:#444;letter-spacing:.12em;font-family:'DM Mono',monospace">W${w.id}</span>
          <span class="week-card-title">${w.theme}</span>
        </div>
        <span class="week-card-status ${complete?'done':''}">${complete ? 'COMPLETE ✓' : count + ' / 5'}</span>

      <div class="week-progress-wrap">
        <div class="week-progress-track">
          <div class="week-progress-fill" style="width:${Math.min(count/5*100,100)}%"></div>
        </div>
        <div class="week-progress-label">${count}/5 ログ記録</div>
      </div>
      ${isActive ? `
      <div class="week-detail">
        <div class="constraint"><div class="lbl" style="margin-bottom:6px">縛り</div><p>${w.constraint}</p></div>
        <div class="mission-grid">

  photoDrop.appendChild(photoInput);

    newPhotoBlob = new Blob([await file.arrayBuffer()], {type: file.type});
    const img = photoWrap.querySelector('img') || el('img');
    img.src = URL.createObjectURL(newPhotoBlob);
    img.style.cssText = 'width:100%;max-height:200px;object-fit:contain;display:block;background:#050505;margin-bottom:8px';
    if (!photoWrap.querySelector('img')) photoWrap.insertBefore(img, photoDrop);
    photoDrop.querySelector('span:last-child').textContent = '変更する';
  };

  photoDrop.addEventListener('click', () => photoInput.click());
  photoDrop.addEventListener('dragover', e => e.preventDefault());
  photoDrop.addEventListener('drop', e => { e.preventDefault(); handleEditPhoto(e.dataTransfer.files[0]); });
  photoInput.addEventListener('change', e => handleEditPhoto(e.target.files[0]));
  photoWrap.appendChild(photoDrop);
  wrap.appendChild(photoWrap);

  // レンズ選択
  const lensLbl = el('div', 'lbl'); lensLbl.textContent = 'レンズ';
  lensLbl.style.cssText = 'margin-top:16px;margin-bottom:8px';
  wrap.appendChild(lensLbl);
  const lensWrap = el('div'); lensWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px';
  let editLens = m.lens || LENSES[0];
  const renderEditLenses = () => {
    lensWrap.innerHTML = '';
    LENSES.forEach(l => {
      const b = el('button', 'lens-btn' + (editLens === l ? ' active' : ''));
      b.textContent = l;
      b.addEventListener('click', () => { editLens = l; renderEditLenses(); });
      lensWrap.appendChild(b);
    });
  };
  renderEditLenses();
  wrap.appendChild(lensWrap);

  // コメント
  const commentLbl = el('div', 'lbl'); commentLbl.textContent = '気づきコメント';
  commentLbl.style.cssText = 'margin-bottom:8px';
  wrap.appendChild(commentLbl);
  const commentTA = document.createElement('textarea');
  commentTA.rows = 3;
  commentTA.value = m.comment || '';
  commentTA.placeholder = '気づきを書く';
  commentTA.style.cssText = 'border:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:8px 12px;font-size:12px;background:#0a0a0a;line-height:1.8;margin-bottom:14px';
  wrap.appendChild(commentTA);

  // 保存ボタン
  const saveBtn = el('button', 'save-btn');
  saveBtn.textContent = '保存する';
  saveBtn.style.marginTop = '4px';
  saveBtn.addEventListener('click', async () => {
    saveBtn.textContent = '保存中...';

    // 写真をIndexedDBに保存
    if (newPhotoBlob) {
      await IDB.set('main_' + date, newPhotoBlob);
    }

    // メタデータを更新
    const meta = LS.get('meta') || {};
    meta[date] = {
      ...( meta[date] || {} ),
      comment: commentTA.value,
      lens: editLens,
      hasPhoto: !!(newPhotoBlob || existingBlob),
    };
    LS.set('meta', meta);

    // Supabaseにも同期
    await SB.upsert(date, meta[date]);

    saveBtn.textContent = '保存しました ✓';
    setTimeout(() => {
      // 詳細ビューを再描画
      showDetail(date);
    }, 800);
  });
  wrap.appendChild(saveBtn);
  container.appendChild(wrap);
}

// ── ログ詳細表示 ──────────────────────────────
async function showDetail(date) {
  // 一覧を隠して詳細を表示（C言語の画面切り替えに相当）
  qs('#log-list-view').classList.add('hidden');
  qs('#log-detail-view').classList.remove('hidden');

  const meta = LS.get('meta') || {};
  const m = meta[date] || {};
  const detail = qs('#detail-content');
  detail.innerHTML = '';

  // 日付・レンズ
  const dateEl = el('div', 'detail-date'); dateEl.textContent = fmtFull(date);
  detail.appendChild(dateEl);
  if (m.lens) { const lensEl = el('div', 'detail-lens'); lensEl.textContent = m.lens; detail.appendChild(lensEl); }

  // メイン写真
  const blob = await IDB.get('main_' + date);
  if (blob) {
    const wrap = el('div', 'detail-photo');
    const img = el('img'); img.src = URL.createObjectURL(blob);
    wrap.appendChild(img); detail.appendChild(wrap);
  } else {
    const noPhoto = el('div', 'detail-no-photo'); noPhoto.textContent = 'NO PHOTO';
    detail.appendChild(noPhoto);
  }

  // 気づきコメント
  if (m.comment) {
    const sec = el('div', 'detail-section');
    const lbl = el('div', 'lbl'); lbl.textContent = '今日の気づき';
    const comment = el('div', 'detail-comment'); comment.textContent = m.comment;
    sec.appendChild(lbl); sec.appendChild(comment);
    detail.appendChild(sec);
  }

  // プロ研究
  const proBlobs = await Promise.all([0,1,2].map(i => IDB.get('pro' + i + '_' + date)));
  const proMemos = m.proMemos || ['','',''];
  if (proBlobs.some(b => b) || proMemos.some(x => x)) {
    const sec = el('div', 'detail-section');
    const lbl = el('div', 'lbl'); lbl.textContent = 'プロ研究';
    const grid = el('div', 'detail-pro-grid');
    [0,1,2].forEach(i => {
      const item = el('div', 'detail-pro-item');
      if (proBlobs[i]) {
        const img = el('img', 'detail-pro-img'); img.src = URL.createObjectURL(proBlobs[i]);
        item.appendChild(img);
      } else {
        const empty = el('div', 'detail-pro-empty'); empty.textContent = i+1;
        item.appendChild(empty);
      }
      if (proMemos[i]) {
        const memo = el('div', 'detail-pro-memo'); memo.textContent = proMemos[i];
        item.appendChild(memo);
      }
      grid.appendChild(item);
    });
    sec.appendChild(lbl); sec.appendChild(grid);
    detail.appendChild(sec);
  }

  // 編集ボタン
  const editBtn = el('button', 'edit-btn');
  editBtn.textContent = 'この日を編集する';
  editBtn.addEventListener('click', () => showEditMode(date, detail, editBtn));
  detail.appendChild(editBtn);
}

async function renderLog() {
  const meta = LS.get('meta') || {};
  const dates = Object.keys(meta).sort((a,b) => b > a ? 1 : -1);
  qs('#log-count').textContent = dates.length + ' ENTRIES';
  const list = qs('#log-list');
  list.innerHTML = '';
  if (dates.length === 0) {
    const e = el('div', 'log-empty');
    e.innerHTML = 'まだ記録がありません<br>今日タブから最初の1枚を記録しよう';
    list.appendChild(e); return;
  }
  for (const date of dates) {
    const m = meta[date] || {};
    const entry = el('div', 'log-entry');
    const thumb = el('div', 'log-thumb');
    const blob = await IDB.get('main_' + date);
    if (blob) {
      const img = el('img');
      img.src = URL.createObjectURL(blob);
      thumb.appendChild(img);
    } else {
      const empty = el('div', 'log-thumb-empty'); empty.textContent = 'NO IMG';
      thumb.appendChild(empty);
    }
    const info = el('div');
    const metaRow = el('div', 'log-meta');
    const dateSpan = el('span', 'log-date'); dateSpan.textContent = fmtFull(date);
    metaRow.appendChild(dateSpan);
    if (m.lens) { const tag = el('span', 'tag'); tag.textContent = m.lens; metaRow.appendChild(tag); }
    info.appendChild(metaRow);
    if (m.comment) { const c = el('div', 'log-comment'); c.textContent = m.comment; info.appendChild(c); }
    if (m.proMemos?.filter(x=>x).length > 0) {
      const pro = el('div', 'log-pro');
      const lbl = el('span', 'log-pro-label'); lbl.textContent = 'PRO STUDY ×' + m.proMemos.filter(x=>x).length;
      pro.appendChild(lbl); info.appendChild(pro);
    }
    entry.appendChild(thumb); entry.appendChild(info);
    entry.addEventListener('click', () => showDetail(date));
    list.appendChild(entry);
  }
}

// ── 詳細→一覧戻るボタン ───────────────────────
qs('#detail-back-btn').addEventListener('click', () => {
  qs('#log-detail-view').classList.add('hidden');
  qs('#log-list-view').classList.remove('hidden');
});

// ── 初期データ読み込み ─────────────────────────
(async function init() {
  const meta = LS.get('meta') || {};
  const today = state.today;
  if (meta[today]) {
    qs('#photo-comment').value = meta[today].comment || '';
    const savedLens = meta[today].lens;
    if (savedLens) { state.lens = savedLens; renderLenses(); }
  }
  const blob = await IDB.get('main_' + today);
  if (blob) {
    state.photoObjUrl = URL.createObjectURL(blob);
    renderPhotoZone();
  }
  for (let i = 0; i < 3; i++) {
    const b = await IDB.get('pro' + i + '_' + today);
    if (b) state.proObjUrls[i] = URL.createObjectURL(b);
  }
  renderProGrid();
  const tc = LS.get('tasks_cache');
  if (tc && tc.tasks && (Date.now() - new Date(tc.fetchedAt).getTime() < 3600000)) {
    state.tasks = tc.tasks;
  }
  renderTasks();

  // Supabaseから最新データを取得してlocalStorageにマージ
  const rows = await SB.fetchAll();
  if (rows && rows.length > 0) {
    const meta = LS.get('meta') || {};
    rows.forEach(row => {
      // Supabaseのデータの方が新しい場合は上書き
      const local = meta[row.date];
      const sbUpdated = new Date(row.updated_at).getTime();
      const localUpdated = local?._updated || 0;
      if (!local || sbUpdated > localUpdated) {
        meta[row.date] = {
          comment: row.comment || '',
          lens: row.lens || '',
          hasPhoto: local?.hasPhoto || false,
          proMemos: row.pro_memos || [],
          _updated: sbUpdated
        };
      }
    });
    LS.set('meta', meta);
    // 今日のデータを反映
    const todayMeta = meta[state.today];
    if (todayMeta) {
      if (!qs('#photo-comment').value) {
        qs('#photo-comment').value = todayMeta.comment || '';
      }
      if (todayMeta.lens) { state.lens = todayMeta.lens; renderLenses(); }
      const proMemos = todayMeta.proMemos || [];
      [0,1,2].forEach(i => {
        const inp = qs('#pro-memo-' + i);
        if (inp && !inp.value) inp.value = proMemos[i] || '';
      });
    }
  }

  // ── 日付チェック・自動リセット ────────────────
  // 前回開いた日と今日が違ければUIだけリセット（ログデータは保持）
  const lastDate = LS.get('last_opened_date');
  if (lastDate && lastDate !== state.today) {
    qs('#photo-comment').value = '';
    state.lens = LENSES[0];
    renderLenses();
    state.photoObjUrl = null;
    state.proObjUrls = [null, null, null];
    renderPhotoZone();
    [0,1,2].forEach(i => {
      const inp = qs('#pro-memo-' + i);
      if (inp) inp.value = '';
    });
    renderProGrid();
  }
  LS.set('last_opened_date', state.today);
})();
</script>
