<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>test</title></head>
<body style="background:#080808;color:#e8e8e8;font-family:monospace;padding:40px">
<div id="root"></div>
<div id="status" style="color:#555;font-size:12px">Loading...</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
document.getElementById('status').textContent = 'React loaded';
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
document.getElementById('status').textContent = 'Babel loaded';
</script>
<script type="text/babel">
document.getElementById('status').textContent = 'Babel running';
function App() {
  return <div style={{color:"#e8e8e8",fontSize:16}}>動いてます ✓</div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
document.getElementById('status').textContent = 'React rendered';
</script>
</body></html>
