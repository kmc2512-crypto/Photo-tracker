<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真成長記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;background:#080808}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222}
  body{font-family:'DM Mono',monospace;color:#e8e8e8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── IndexedDB（写真の原画質保存用）──────────────────
const IDB_NAME = "photo_tracker_v1";
const IDB_STORE = "photos";
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, blob) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete = () => res(true);
    tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(IDB_STORE).objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => rej(req.error);
  });
}
async function idbDel(key) {
  const db = await openDB();
  return new Promise((res) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => res(true);
  });
}

// ── localStorage（テキストデータ用）──────────────────
const lget = (k) => { try { const v=localStorage.getItem("ptr_"+k); return v?JSON.parse(v):null; } catch { return null; } };
const lset = (k,v) => { try { localStorage.setItem("ptr_"+k,JSON.stringify(v)); } catch {} };

// ── ファイル → Blob変換 ──────────────────────────
function fileToBlob(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => res(new Blob([e.target.result], { type: file.type || "image/jpeg" }));
    reader.readAsArrayBuffer(file);
  });
}
function blobToUrl(blob) {
  return blob ? URL.createObjectURL(blob) : null;
}

// ── 定数 ─────────────────────────────────────────
const LENSES = ["55mm f2.8","Sigma 28-70","16-50","55-210","スマホ"];
const WEEKS = [
  {id:1,dates:"5/28〜6/3",theme:"構図を体に叩き込む",constraint:"55mm f2.8のみ。ズーム禁止。足で動く。",weekday:"同じ被写体を三分割・日の丸・対角線の3構図で撮り比べる。学校の行き帰りでOK。",weekend:"1シーンにつき低・中・高の3アングル必須。同じ場所で30枚以上。",check:"3構図の撮り比べを見て「どれが一番伝わるか」を言えるか"},
  {id:2,dates:"6/4〜6/10",theme:"光だけを追いかける",constraint:"撮影は朝7時前か夕方17時以降のみ。昼間は撮らない。",weekday:"登下校中に「今日一番いい光」を1枚だけ撮る。",weekend:"日の出撮影。同じ場所を6時・7時・8時の3回撮り比べる。",check:"「今日の光は何時が一番良かったか」を理由付きで言えるか"},
  {id:3,dates:"6/11〜6/17",theme:"引き算を覚える",constraint:"1枚に写る「主役」は必ず1つだけ。2つあったら撮り直す。",weekday:"撮った写真を見て「主役以外で目立っているもの」を書き出す。",weekend:"Week1・Week2の写真100枚を見直してベスト10を選ぶ。",check:"ベスト10の選定理由が「光・構図・意図」の3軸で語れるか"},
  {id:4,dates:"6/18〜6/24",theme:"プロを完全模倣する",constraint:"1人の写真家を決めて、その人の写真を完璧に模倣した1枚を撮る。",weekday:"選んだ写真家の作品を1枚分析。焦点距離・絞り・光の方向・距離を推測。",weekend:"分析した1枚を完全再現しに行く。場所・時間帯・構図を全部合わせる。",check:"元の写真と並べて「なぜ違うか」を3点言えるか"},
  {id:5,dates:"6/25〜7/1",theme:"テーマで20枚撮る",constraint:"週の最初にテーマを1つ決める。それ以外は撮らない。",weekday:"テーマに沿った被写体だけを撮る。毎日最低3枚。",weekend:"20枚をLightroomで1フォルダに並べる。色調・明るさのトーンを統一。",check:"20枚を見知らぬ人に見せてテーマが伝わるか"},
  {id:6,dates:"7/2〜7/8",theme:"外部の目にさらす",constraint:"自分で良いと思う写真を5枚、家族以外の人に見せて感想をもらう。",weekday:"SNS（Instagram・500px）にベスト写真を投稿。反応を記録する。",weekend:"Week1とWeek5の写真を並べて変化を言語化。6週間の総括を書く。",check:"「自分の写真はこういう写真だ」を1文で言えるか"},
];

const todayKey = () => new Date().toISOString().slice(0,10);
const fmtFull = (s) => { try{const d=new Date(s+"T00:00:00");return `${d.getMonth()+1}月${d.getDate()}日`;}catch{return s;}};
const isOverdue = (due) => due && new Date(due+"T23:59:59") < new Date();

const M="'DM Mono',monospace";
const S="'Syne',sans-serif";
const C={bg:"#080808",fg:"#e8e8e8",dim:"#555",mid:"#888",line:"#181818",line2:"#2a2a2a",panel:"#0e0e0e",red:"#cc6666",redLine:"#663333"};

// ── App ──────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("today");
  const [meta,setMeta]=useState({});       // {date: {comment,lens,hasPro:[bool,bool,bool],proMemos:[...]}}
  const [checks,setChecks]=useState({});
  const [tasks,setTasks]=useState([]);
  const [tasksDone,setTasksDone]=useState({});
  const [tasksLoading,setTasksLoading]=useState(false);
  const [tasksError,setTasksError]=useState("");
  const [scriptUrl,setScriptUrl]=useState("");
  const [editingUrl,setEditingUrl]=useState(false);
  const [urlInput,setUrlInput]=useState("");
  const [activeWeek,setActiveWeek]=useState(1);
  const [appLoading,setAppLoading]=useState(true);
  const [saved,setSaved]=useState(false);

  // 今日の状態
  const today = todayKey();
  const [photoUrl,setPhotoUrl]=useState(null);
  const [photoComment,setPhotoComment]=useState("");
  const [photoLens,setPhotoLens]=useState(LENSES[0]);
  const [proUrls,setProUrls]=useState([null,null,null]);
  const [proMemos,setProMemos]=useState(["","",""]);

  // ログビュー用
  const [logUrls,setLogUrls]=useState({});

  const photoRef=useRef();
  const proRefs=[useRef(),useRef(),useRef()];

  // 初期ロード
  useEffect(()=>{
    (async()=>{
      const m=lget("meta")||{};
      const c=lget("checks")||{};
      const td=lget("tasks_done")||{};
      const url=lget("script_url")||"";
      const tc=lget("tasks_cache");
      setMeta(m); setChecks(c); setTasksDone(td); setScriptUrl(url); setUrlInput(url);
      if(tc&&tc.tasks&&(Date.now()-new Date(tc.fetchedAt).getTime()<3600000)) setTasks(tc.tasks);

      // 今日の写真をIndexedDBから読み込む
      const blob = await idbGet("main_"+today);
      if(blob) setPhotoUrl(blobToUrl(blob));

      // 今日のプロ写真
      const urls=[null,null,null];
      for(let i=0;i<3;i++){
        const b=await idbGet(`pro${i}_${today}`);
        if(b) urls[i]=blobToUrl(b);
      }
      setProUrls(urls);

      if(m[today]){
        setPhotoComment(m[today].comment||"");
        setPhotoLens(m[today].lens||LENSES[0]);
        setProMemos(m[today].proMemos||["",""]);
      }

      setAppLoading(false);
    })();
  },[]);

  // ログタブ用のサムネ読み込み
  useEffect(()=>{
    if(tab!=="log") return;
    (async()=>{
      const m=lget("meta")||{};
      const dates=Object.keys(m).sort((a,b)=>b>a?1:-1);
      const urls={};
      for(const d of dates){
        const blob=await idbGet("main_"+d);
        if(blob) urls[d]=blobToUrl(blob);
      }
      setLogUrls(urls);
    })();
  },[tab]);

  const loadTasks=useCallback(async(url)=>{
    const target=url||scriptUrl;
    if(!target){setTasksError("URLが設定されていません");return;}
    setTasksLoading(true);setTasksError("");
    try{
      const res=await fetch(target,{redirect:"follow"});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      let data;
      try{ data=JSON.parse(text); }catch{ throw new Error("JSONではない応答が返ってきました。URLを直接ブラウザで開いて確認してください"); }
      if(data.error)throw new Error(data.error);
      const list=Array.isArray(data)?data:(data.tasks||[]);
      setTasks(list);
      lset("tasks_cache",{tasks:list,fetchedAt:new Date().toISOString()});
    }catch(e){
      if(e.message==="Failed to fetch")
        setTasksError("接続失敗。Apps Scriptのデプロイで「アクセスできるユーザー：全員」になっているか確認してください");
      else setTasksError(e.message);
    }
    setTasksLoading(false);
  },[scriptUrl]);

  const saveUrl=useCallback(()=>{setScriptUrl(urlInput);lset("script_url",urlInput);setEditingUrl(false);setTimeout(()=>loadTasks(urlInput),100);},[urlInput,loadTasks]);

  const saveDay=useCallback(async()=>{
    const m=lget("meta")||{};
    m[today]={comment:photoComment,lens:photoLens,hasPhoto:!!photoUrl,hasPro:proUrls.map(u=>!!u),proMemos};
    setMeta(m); lset("meta",m);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  },[today,photoComment,photoLens,photoUrl,proUrls,proMemos]);

  const handlePhoto=useCallback(async(file)=>{
    if(!file)return;
    const blob=await fileToBlob(file);
    await idbSet("main_"+today, blob);
    setPhotoUrl(blobToUrl(blob));
  },[today]);

  const removePhoto=useCallback(async()=>{
    await idbDel("main_"+today);
    setPhotoUrl(null);
  },[today]);

  const handlePro=useCallback(async(file,i)=>{
    if(!file)return;
    const blob=await fileToBlob(file);
    await idbSet(`pro${i}_${today}`, blob);
    setProUrls(prev=>{const n=[...prev];n[i]=blobToUrl(blob);return n;});
  },[today]);

  const removePro=useCallback(async(i)=>{
    await idbDel(`pro${i}_${today}`);
    setProUrls(prev=>{const n=[...prev];n[i]=null;return n;});
  },[today]);

  const toggleCheck=useCallback((k)=>{const n={...checks,[k]:!checks[k]};setChecks(n);lset("checks",n);},[checks]);
  const toggleDone=useCallback((k)=>{const n={...tasksDone,[k]:!tasksDone[k]};setTasksDone(n);lset("tasks_done",n);},[tasksDone]);

  const allDates=Object.keys(lget("meta")||{}).sort((a,b)=>b>a?1:-1);
  const pendingTasks=tasks.filter(t=>!tasksDone[t.id||t.title+t.due]);
  const streak=(()=>{let s=0;const now=new Date();for(let i=0;i<60;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const m=lget("meta")||{};if(m[k]?.comment||m[k]?.proMemos?.some(x=>x))s++;else if(i>0)break;}return s;})();

  if(appLoading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,fontFamily:M,fontSize:11,color:"#222",letterSpacing:".2em"}}>LOADING</div>;

  const css=`
    input,textarea{font-family:'DM Mono',monospace;background:transparent;border:none;border-bottom:1px solid #222;color:#e8e8e8;outline:none;width:100%;padding:8px 0;font-size:12px;line-height:1.7;resize:none;}
    input:focus,textarea:focus{border-bottom-color:#444;}
    input::placeholder,textarea::placeholder{color:#333;}
    .tab{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:0 20px;height:48px;color:#444;border-bottom:1px solid transparent;}
    .tab:hover{color:#888;}
    .tab-on{color:#e8e8e8!important;border-bottom-color:#e8e8e8!important;}
    .bg{background:none;border:1px solid #222;color:#666;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;padding:6px 14px;}
    .bg:hover{border-color:#444;color:#e8e8e8;}
    .bg:disabled{opacity:.25;cursor:default;}
    .bs{background:#e8e8e8;border:none;color:#080808;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;font-weight:500;padding:8px 20px;}
    .bs:hover{background:#fff;}
    .lens{background:none;border:1px solid #1e1e1e;color:#444;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:4px 10px;}
    .lens:hover{border-color:#333;color:#aaa;}
    .lens-on{border-color:#444!important;color:#e8e8e8!important;}
    .drop{border:1px dashed #1e1e1e;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
    .drop:hover{border-color:#333;}
    .wtab{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:#333;padding:8px 0;border-bottom:1px solid transparent;margin-right:20px;}
    .wtab:hover{color:#777;}
    .won{color:#e8e8e8!important;border-bottom-color:#e8e8e8!important;}
    .lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#444;}
    .crow{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:7px 0;}
    .cb{width:12px;height:12px;border:1px solid #2a2a2a;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
    .cb-on{background:#e8e8e8;border-color:#e8e8e8;}
    .trow{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid #151515;cursor:pointer;}
    .trow:last-child{border-bottom:none;}
    .tag{display:inline-block;border:1px solid #2a2a2a;color:#888;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;padding:3px 8px;}
    .notice{background:#0c0c0c;border:1px solid #1a1a1a;padding:14px 16px;margin-bottom:16px;}
    .delbtn{position:absolute;top:10px;right:10px;background:rgba(8,8,8,.88);border:1px solid #2a2a2a;color:#888;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;letter-spacing:.06em;}
    .delbtn:hover{color:#e8e8e8;border-color:#555;}
  `;

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.fg,fontFamily:M}}>
      <style>{css}</style>

      {/* NAV */}
      <nav style={{borderBottom:`1px solid ${C.line}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 32px",position:"sticky",top:0,background:C.bg,zIndex:10,height:48}}>
        <span style={{fontFamily:S,fontSize:11,fontWeight:800,letterSpacing:".18em",textTransform:"uppercase"}}>写真成長記録</span>
        <div style={{display:"flex"}}>
          {[["today","今日"],["plan","プラン"],["log","ログ"]].map(([id,l])=>(
            <button key={id} className={`tab ${tab===id?"tab-on":""}`} onClick={()=>setTab(id)}>{l}</button>
          ))}
        </div>
        <span style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".1em"}}>{streak>1?`${streak}日連続`:""}</span>
      </nav>

      <div style={{maxWidth:640,margin:"0 auto",padding:"40px 32px 80px"}}>

        {/* ── TODAY ── */}
        {tab==="today"&&(
          <div>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:36}}>
              <div>
                <div style={{fontFamily:"'Space Grotesk',-apple-system,sans-serif",fontSize:28,fontWeight:700,letterSpacing:"-.01em",lineHeight:1}>{new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric"})}</div>
                <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".15em",marginTop:6}}>{new Date().toLocaleDateString("ja-JP",{weekday:"long"})}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12,paddingTop:4}}>
                {saved&&<span style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".1em"}}>保存済み</span>}
                <button className="bs" onClick={saveDay}>SAVE</button>
              </div>
            </div>

            {/* 課題 */}
            <div style={{marginBottom:40}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span className="lbl">課題</span>
                  {pendingTasks.length>0&&<span style={{fontFamily:M,fontSize:10,color:C.mid}}>{pendingTasks.length}件</span>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="bg" onClick={()=>setEditingUrl(v=>!v)}>URL設定</button>
                  <button className="bg" onClick={()=>loadTasks()} disabled={tasksLoading}>{tasksLoading?"...":"SYNC"}</button>
                </div>
              </div>
              {editingUrl&&(
                <div className="notice">
                  <div className="lbl" style={{marginBottom:10}}>APPS SCRIPT URL</div>
                  <div style={{fontFamily:M,fontSize:10,color:"#555",lineHeight:1.9,marginBottom:14}}>
                    Apps Scriptをデプロイして発行されたURLを貼る<br/>
                    ※デプロイ設定の「アクセスできるユーザー」を<strong style={{color:"#888"}}>「全員」</strong>に設定してください
                  </div>
                  <input style={{background:"#0a0a0a",border:"1px solid #1e1e1e",padding:"8px 12px",fontSize:11,width:"100%",color:"#e8e8e8",outline:"none"}} placeholder="https://script.google.com/macros/s/..." value={urlInput} onChange={e=>setUrlInput(e.target.value)}/>
                  <div style={{display:"flex",gap:8,marginTop:12}}>
                    <button className="bs" onClick={saveUrl}>保存してSYNC</button>
                    <button className="bg" onClick={()=>setEditingUrl(false)}>キャンセル</button>
                  </div>
                </div>
              )}
              {tasksError&&(
                <div className="notice">
                  <div style={{fontFamily:M,fontSize:11,color:"#666",lineHeight:1.9}}>{tasksError}</div>
                </div>
              )}
              {!scriptUrl&&!editingUrl&&!tasksError&&(
                <div style={{fontFamily:M,fontSize:11,color:C.dim,padding:"16px 0",letterSpacing:".05em"}}>「URL設定」からApps ScriptのURLを登録してください</div>
              )}
              {tasks.length>0&&(
                <div>
                  {tasks.map((t,i)=>{
                    const k=t.id||t.title+t.due; const done=tasksDone[k]; const over=isOverdue(t.due)&&!done;
                    return(
                      <div key={i} className="trow" onClick={()=>toggleDone(k)}>
                        <div className={`cb ${done?"cb-on":""}`} style={{marginTop:3}}>
                          {done&&<span style={{color:C.bg,fontSize:9,fontWeight:700}}>✓</span>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:M,fontSize:13,color:done?"#444":over?C.red:C.fg,textDecoration:done?"line-through":"none",letterSpacing:".02em",lineHeight:1.6}}>{t.title}</div>
                          <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                            {t.subject&&<span className="tag">{t.subject}</span>}
                            {t.due&&<span style={{fontFamily:M,fontSize:11,color:over?C.red:"#777",letterSpacing:".05em"}}>{fmtFull(t.due)}{over?" · 期限切れ":""}</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div style={{borderTop:`1px solid ${C.line}`,margin:"0 0 40px"}}/>

            {/* 写真記録 */}
            <div style={{marginBottom:40}}>
              <div className="lbl" style={{marginBottom:4}}>写真記録</div>
              <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".06em",marginBottom:14,lineHeight:1.8}}>原画質で保存されます</div>
              <div className="drop" style={{height:photoUrl?"auto":160,marginBottom:14,position:"relative"}}
                onClick={()=>!photoUrl&&photoRef.current.click()}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{e.preventDefault();handlePhoto(e.dataTransfer.files[0]);}}>
                {photoUrl?(
                  <div style={{width:"100%",position:"relative"}}>
                    <img src={photoUrl} style={{width:"100%",maxHeight:500,objectFit:"contain",display:"block",background:"#050505"}}/>
                    <button className="delbtn" onClick={e=>{e.stopPropagation();removePhoto();}}>削除</button>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:18,color:"#1e1e1e"}}>+</div>
                    <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".12em"}}>写真をドロップ or クリック</div>
                    <div style={{fontFamily:M,fontSize:9,color:"#333",letterSpacing:".08em"}}>原画質で保存</div>
                  </>
                )}
              </div>
              <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handlePhoto(e.target.files[0])}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
                {LENSES.map(l=><button key={l} className={`lens ${photoLens===l?"lens-on":""}`} onClick={()=>setPhotoLens(l)}>{l}</button>)}
              </div>
              <textarea rows={3} placeholder="今日の気づき — 「光が良かった」は不正解。「逆光で葉が透けて希望を感じるから」が正解。" value={photoComment} onChange={e=>setPhotoComment(e.target.value)}/>
            </div>

            <div style={{borderTop:`1px solid ${C.line}`,margin:"0 0 40px"}}/>

            {/* プロ研究 */}
            <div style={{marginBottom:40}}>
              <div className="lbl" style={{marginBottom:4}}>プロ研究</div>
              <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".06em",marginBottom:18,lineHeight:1.8}}>プロ写真家の作品を3枚アップして「なぜ良いか」を1行で</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[0,1,2].map(i=>(
                  <div key={i}>
                    <div className="drop" style={{height:proUrls[i]?"auto":80,marginBottom:8,position:"relative"}}
                      onClick={()=>!proUrls[i]&&proRefs[i].current.click()}
                      onDragOver={e=>e.preventDefault()}
                      onDrop={e=>{e.preventDefault();handlePro(e.dataTransfer.files[0],i);}}>
                      {proUrls[i]?(
                        <div style={{position:"relative"}}>
                          <img src={proUrls[i]} style={{width:"100%",height:80,objectFit:"cover",display:"block"}}/>
                          <button onClick={e=>{e.stopPropagation();removePro(i);}} style={{position:"absolute",top:4,right:4,background:"rgba(8,8,8,.9)",border:`1px solid #2a2a2a`,color:"#888",cursor:"pointer",fontFamily:M,fontSize:9,padding:"2px 6px"}}>×</button>
                        </div>
                      ):(
                        <><div style={{fontSize:14,color:"#1e1e1e"}}>+</div><div style={{fontFamily:M,fontSize:9,color:C.dim,letterSpacing:".1em"}}>{i+1}</div></>
                      )}
                    </div>
                    <input ref={proRefs[i]} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handlePro(e.target.files[0],i)}/>
                    <input placeholder={`なぜ良いか ${i+1}`} value={proMemos[i]} onChange={e=>setProMemos(prev=>{const n=[...prev];n[i]=e.target.value;return n;})} style={{fontSize:11}}/>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── PLAN ── */}
        {tab==="plan"&&(
          <div>
            <div style={{marginBottom:36}}>
              <div style={{fontFamily:S,fontSize:26,fontWeight:800,letterSpacing:"-.02em"}}>週間プラン</div>
              <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".15em",marginTop:6}}>6 WEEK INTENSIVE</div>
            </div>
            <div style={{display:"flex",borderBottom:`1px solid ${C.line}`,marginBottom:28}}>
              {WEEKS.map(w=><button key={w.id} className={`wtab ${activeWeek===w.id?"won":""}`} onClick={()=>setActiveWeek(w.id)}>W{w.id}</button>)}
            </div>
            {(()=>{
              const w=WEEKS.find(x=>x.id===activeWeek);
              return(
                <div>
                  <div style={{display:"flex",alignItems:"baseline",gap:16,marginBottom:24}}>
                    <div style={{fontFamily:S,fontSize:20,fontWeight:800}}>{w.theme}</div>
                    <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".08em"}}>{w.dates}</div>
                  </div>
                  <div style={{borderLeft:`2px solid ${C.redLine}`,paddingLeft:16,marginBottom:28}}>
                    <div className="lbl" style={{marginBottom:6,color:C.redLine}}>縛り</div>
                    <div style={{fontFamily:M,fontSize:12,color:C.red,lineHeight:1.7,letterSpacing:".02em"}}>{w.constraint}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:28}}>
                    {[["平日ミッション",w.weekday],["週末ミッション",w.weekend]].map(([label,text])=>(
                      <div key={label} style={{borderTop:`1px solid ${C.line}`,paddingTop:14}}>
                        <div className="lbl" style={{marginBottom:10}}>{label}</div>
                        <div style={{fontFamily:M,fontSize:11,color:"#777",lineHeight:1.9,letterSpacing:".02em"}}>{text}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{borderTop:`1px solid ${C.line}`,paddingTop:16,marginBottom:32}}>
                    <div className="lbl" style={{marginBottom:12}}>週末チェック</div>
                    <div className="crow" onClick={()=>toggleCheck(`w${w.id}_main`)}>
                      <div className={`cb ${checks[`w${w.id}_main`]?"cb-on":""}`}>
                        {checks[`w${w.id}_main`]&&<span style={{color:C.bg,fontSize:9,fontWeight:700}}>✓</span>}
                      </div>
                      <div style={{fontFamily:M,fontSize:12,color:checks[`w${w.id}_main`]?"#333":"#aaa",textDecoration:checks[`w${w.id}_main`]?"line-through":"none",lineHeight:1.6,letterSpacing:".02em"}}>{w.check}</div>
                    </div>
                  </div>
                  <div style={{borderTop:`1px solid ${C.line}`,paddingTop:20}}>
                    <div className="lbl" style={{marginBottom:12}}>全体進捗</div>
                    <div style={{display:"flex",gap:3,marginBottom:8}}>
                      {WEEKS.map(wk=><div key={wk.id} style={{flex:1,height:2,background:checks[`w${wk.id}_main`]?C.fg:"#141414"}}/>)}
                    </div>
                    <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".08em"}}>{WEEKS.filter(wk=>checks[`w${wk.id}_main`]).length} / 6 COMPLETE</div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ── LOG ── */}
        {tab==="log"&&(
          <div>
            <div style={{marginBottom:36}}>
              <div style={{fontFamily:S,fontSize:26,fontWeight:800,letterSpacing:"-.02em"}}>ログ一覧</div>
              <div style={{fontFamily:M,fontSize:10,color:C.dim,letterSpacing:".15em",marginTop:6}}>{allDates.length} ENTRIES</div>
            </div>
            {allDates.length===0
              ?<div style={{fontFamily:M,fontSize:11,color:C.dim,lineHeight:3,letterSpacing:".08em"}}>まだ記録がありません<br/>今日タブから最初の1枚を記録しよう</div>
              :<div>
                {allDates.map(date=>{
                  const m=(lget("meta")||{})[date]||{};
                  const url=logUrls[date];
                  return(
                    <div key={date} style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:16,paddingBottom:20,marginBottom:20,borderBottom:"1px solid #0c0c0c"}}>
                      <div style={{background:C.panel,height:80,overflow:"hidden"}}>
                        {url?<img src={url} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                          :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:9,color:"#1a1a1a",fontFamily:M,letterSpacing:".1em"}}>NO IMG</span></div>}
                      </div>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                          <span style={{fontFamily:M,fontSize:12,color:C.fg,letterSpacing:".04em"}}>{fmtFull(date)}</span>
                          {m.lens&&<span className="tag">{m.lens}</span>}
                        </div>
                        {m.comment&&<div style={{fontFamily:M,fontSize:11,color:"#666",lineHeight:1.7,letterSpacing:".01em",marginBottom:8,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{m.comment}</div>}
                        {m.proMemos?.filter(x=>x).length>0&&(
                          <div style={{display:"flex",gap:5,alignItems:"center"}}>
                            <span style={{fontFamily:M,fontSize:9,color:C.dim,letterSpacing:".08em"}}>PRO STUDY ×{m.proMemos.filter(x=>x).length}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(e){ return {hasError:true,error:e}; }
  render(){
    if(this.state.hasError) return (
      <div style={{padding:"40px 32px",fontFamily:"'DM Mono',monospace",color:"#888",fontSize:12,lineHeight:2}}>
        <div style={{color:"#e8e8e8",marginBottom:12}}>エラーが発生しました</div>
        <div style={{color:"#555",fontSize:11}}>{String(this.state.error)}</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:20,background:"none",border:"1px solid #333",color:"#888",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,padding:"6px 16px",letterSpacing:".1em"}}>再読み込み</button>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);

</script>
</body>
</html>
